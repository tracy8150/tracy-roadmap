<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>老脆的人生roadmap</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F6F3EC;
    --ink:#232019;
    --ink-soft:#5C574C;
    --ext:#B8442D;
    --ext-bg:#F3E4DE;
    --int:#3E7A5E;
    --int-bg:#E4ECE4;
    --line:#D8D2C2;
    --gold:#A9812F;
    --card-bg:#FFFDF7;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Noto Sans TC',sans-serif;
    line-height:1.7;
    padding:0 0 6rem;
  }
  header{
    max-width:760px;
    margin:0 auto;
    padding:4.5rem 24px 3rem;
    border-bottom:1px solid var(--line);
  }
  .eyebrow{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    letter-spacing:0.12em;
    color:var(--gold);
    text-transform:uppercase;
    margin-bottom:1rem;
  }
  h1{
    font-family:'Noto Serif TC',serif;
    font-weight:700;
    font-size:clamp(28px,5vw,42px);
    line-height:1.35;
  }
  .sub{
    margin-top:1rem;
    color:var(--ink-soft);
    font-size:15px;
    max-width:52ch;
  }
  .legend{
    display:flex;
    gap:20px;
    margin-top:2rem;
    font-size:13px;
    color:var(--ink-soft);
  }
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .dot{width:9px;height:9px;border-radius:50%;display:inline-block}
  .dot.ext{background:var(--ext)}
  .dot.int{background:var(--int)}

  main{max-width:760px;margin:0 auto;padding:0 24px}
  #status{
    font-family:'JetBrains Mono',monospace;
    font-size:13px;
    color:var(--ink-soft);
    padding:3rem 0;
  }

  .entry{
    display:grid;
    grid-template-columns:96px 1fr;
    gap:0 20px;
    position:relative;
    padding-bottom:2.5rem;
  }
  .entry::before{
    content:'';
    position:absolute;
    left:100px;
    top:6px;
    bottom:-2.5rem;
    width:1px;
    background:var(--line);
  }
  .entry:last-child::before{display:none}
  .rail{position:relative}
  .time{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    color:var(--ink-soft);
    padding-top:4px;
  }
  .stamp{
    position:absolute;
    left:96px;
    top:2px;
    transform:translateX(-50%);
    width:11px;
    height:11px;
    border-radius:50%;
    border:2px solid var(--bg);
    z-index:1;
  }
  .stamp.ext{background:var(--ext)}
  .stamp.int{background:var(--int)}

  .card{
    background:var(--card-bg);
    border:1px solid var(--line);
    border-radius:2px;
    padding:20px 22px;
  }
  .tags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
  .tag{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    padding:2px 8px;
    border-radius:20px;
    letter-spacing:0.02em;
  }
  .tag.type-ext{background:var(--ext-bg);color:var(--ext)}
  .tag.type-int{background:var(--int-bg);color:var(--int)}
  .tag.attr{background:transparent;border:1px solid var(--line);color:var(--ink-soft)}

  h3{
    font-family:'Noto Serif TC',serif;
    font-weight:600;
    font-size:19px;
    margin-bottom:8px;
  }
  .content{font-size:14.5px;color:var(--ink);margin-bottom:14px}
  .insight{
    font-size:13.5px;
    color:var(--ink-soft);
    border-left:2px solid var(--gold);
    padding-left:12px;
    font-style:normal;
  }
  .insight b{color:var(--gold);font-weight:500}
  .published{
    display:inline-block;
    margin-top:14px;
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--int);
  }

  footer{
    max-width:760px;
    margin:3rem auto 0;
    padding:2rem 24px 0;
    border-top:1px solid var(--line);
    font-size:12px;
    color:var(--ink-soft);
    font-family:'JetBrains Mono',monospace;
  }

  @media (max-width:520px){
    .entry{grid-template-columns:60px 1fr;gap:0 12px}
    .entry::before{left:64px}
    .stamp{left:60px}
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">Ledger / 個人事跡帳本</div>
  <h1>老脆的人生roadmap</h1>
  <p class="sub">前半人生的每一筆投入與轉折,像帳本一樣攤開——紅色是外部事件的支出,綠色是內部轉折的資產。</p>
  <div class="legend">
    <span><i class="dot ext"></i>外部事件</span>
    <span><i class="dot int"></i>內部轉折</span>
  </div>
</header>

<main>
  <div id="status">讀取資料中...</div>
  <div id="timeline"></div>
</main>

<footer>
  資料來源:Google Sheets,即時同步。最後讀取時間會顯示於下方。
</footer>

<script>
// ====== 設定區:換成妳自己發布後的 CSV 網址 ======
const SHEET_ID = '1FC4GitJvxBG0dNQorjmMXvPk4iFa8rdIqZB7oUPMAUs';
const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`;
// ================================================

function parseCSV(text){
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for(let i=0;i<text.length;i++){
    const c = text[i], next = text[i+1];
    if(inQuotes){
      if(c === '"' && next === '"'){ field+='"'; i++; }
      else if(c === '"'){ inQuotes = false; }
      else { field += c; }
    } else {
      if(c === '"'){ inQuotes = true; }
      else if(c === ','){ row.push(field); field=''; }
      else if(c === '\n' || c === '\r'){
        if(c==='\r' && next==='\n') i++;
        row.push(field); rows.push(row); row=[]; field='';
      } else { field += c; }
    }
  }
  if(field.length || row.length){ row.push(field); rows.push(row); }
  return rows.filter(r => r.some(v => v && v.trim().length));
}

function typeClass(type){
  return (type||'').includes('外部') ? 'ext' : 'int';
}

function render(rows){
  const [header, ...data] = rows;
  const idx = name => header.indexOf(name);
  const timeline = document.getElementById('timeline');
  const status = document.getElementById('status');

  if(!data.length){
    status.textContent = '目前表格裡還沒有資料。';
    return;
  }
  status.style.display = 'none';

  timeline.innerHTML = data.map(r => {
    const time = r[idx('Time')] || '';
    const type = r[idx('Type')] || '';
    const tags = (r[idx('Tags')] || '').split(/[,、]/).map(t=>t.trim()).filter(Boolean);
    const title = r[idx('Title')] || '';
    const content = r[idx('Content')] || '';
    const insight = r[idx('Insight')] || '';
    const published = (r[idx('Published')] || '').toUpperCase() === 'TRUE';
    const tClass = typeClass(type);

    return `
      <div class="entry">
        <div class="rail">
          <div class="time">${time}</div>
          <div class="stamp ${tClass}"></div>
        </div>
        <div class="card">
          <div class="tags">
            <span class="tag type-${tClass}">${type}</span>
            ${tags.map(t=>`<span class="tag attr">${t}</span>`).join('')}
          </div>
          <h3>${title}</h3>
          <p class="content">${content}</p>
          ${insight ? `<p class="insight"><b>延伸角度</b> ${insight}</p>` : ''}
          ${published ? '<div class="published">已發布為內容</div>' : ''}
        </div>
      </div>
    `;
  }).join('');
}

fetch(CSV_URL)
  .then(res => {
    if(!res.ok) throw new Error('無法讀取試算表,狀態碼 ' + res.status);
    return res.text();
  })
  .then(text => {
    const rows = parseCSV(text);
    render(rows);
  })
  .catch(err => {
    document.getElementById('status').innerHTML =
      '讀取失敗:' + err.message +
      '<br>請確認 Google Sheets 的共用設定為「知道連結的使用者均可查看」。';
  });
</script>

</body>
</html>
